<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>lens</title>
<link rel="icon" href="data:,">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    color: #fff;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  main {
    width: 100%;
    max-width: 60ch;
    padding: 24px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-height: 100vh;
    overflow: auto;
  }
  #status {
    opacity: 0.5;
  }
  textarea {
    width: 100%;
    box-sizing: border-box;
    min-height: 8em;
    background: #000;
    color: #fff;
    border: 1px solid #fff;
    font: inherit;
    padding: 8px;
    resize: vertical;
    outline: none;
  }
  button {
    align-self: flex-start;
    background: #000;
    color: #fff;
    border: 1px solid #fff;
    font: inherit;
    padding: 6px 14px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  pre {
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    min-height: 1.5em;
  }
  footer {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 12px;
    text-align: center;
    color: #fff;
    opacity: 0.5;
    font-size: 12px;
    pointer-events: none;
  }
</style>
</head>
<body>
<main>
  <div id="status">loading…</div>
  <textarea id="input" spellcheck="false"></textarea>
  <button id="go" disabled>pass through</button>
  <pre id="output"></pre>
</main>
<footer>the lens bends only what can be said.</footer>
<script type="module">
  if (!navigator.gpu) {
    document.body.innerHTML = '';
    document.body.style.cssText += 'display:flex;align-items:center;justify-content:center;';
    const el = document.createElement('div');
    el.textContent = 'this browser cannot host the lens.';
    document.body.appendChild(el);
    throw new Error('no webgpu');
  }

  const { CreateMLCEngine } = await import('https://esm.run/@mlc-ai/web-llm');

  const statusEl = document.getElementById('status');
  const inputEl = document.getElementById('input');
  const goEl = document.getElementById('go');
  const outputEl = document.getElementById('output');

  let engine = null;
  let busy = false;

  const updateButton = () => {
    goEl.disabled = busy || engine === null || inputEl.value.length === 0;
  };
  inputEl.addEventListener('input', updateButton);

  engine = await CreateMLCEngine('Llama-3.2-1B-Instruct-q4f16_1-MLC', {
    initProgressCallback: () => { statusEl.textContent = 'loading…'; },
  });
  statusEl.textContent = 'ready';
  updateButton();

  goEl.addEventListener('click', async () => {
    if (busy) return;
    busy = true;
    updateButton();
    const reply = await engine.chat.completions.create({
      messages: [
        { role: 'system', content: 'respond in under 128 tokens.' },
        { role: 'user', content: inputEl.value },
      ],
      temperature: 0,
      max_tokens: 128,
    });
    outputEl.textContent = reply.choices[0].message.content;
    busy = false;
    updateButton();
  });
</script>
</body>
</html>
